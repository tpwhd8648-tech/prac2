
<style>
*{box-sizing:border-box;margin:0;padding:0}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.pbtn{font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.pbtn:hover{background:var(--color-background-secondary)}
.pbtn.glow{border-color:#FAC775;color:#BA7517}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center}
.sc-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px}
.sc-val{font-size:16px;font-weight:500}
.main-grid{display:grid;grid-template-columns:1fr 220px;gap:10px}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px}
.sec-title{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary)}
.right-col{display:flex;flex-direction:column;gap:10px}
.hcard{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:6px}
.hcard.on{border-color:#9FE1CB}
.havatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hinfo{flex:1;min-width:0}
.hname{font-size:13px;font-weight:500}
.hsub{font-size:11px;color:var(--color-text-secondary)}
.xpbar{height:4px;background:var(--color-background-secondary);border-radius:2px;margin-top:4px;overflow:hidden}
.xpfill{height:100%;background:#9FE1CB;border-radius:2px}
.hbtn{font-size:11px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0}
.hbtn:hover{background:var(--color-background-secondary)}
.hbtn.can{border-color:#9FE1CB;color:#0F6E56}
.hbtn.no{opacity:0.4}
.mbox{text-align:center;padding:8px 6px}
.mrow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.msprite{font-size:38px;line-height:1;display:block;transition:transform 0.08s}
.msprite.hit{transform:scale(0.82)}
.mgold{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.mgold-val{font-size:13px;font-weight:500;color:#BA7517}
.mgold-label{font-size:10px;color:var(--color-text-tertiary)}
.mname{font-size:13px;font-weight:500;margin-bottom:4px}
.hpbar{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin:0 0 4px}
.hpfill{height:100%;border-radius:4px;transition:width 0.15s}
.hptext{font-size:11px;color:var(--color-text-secondary)}
.fbadge{display:inline-block;font-size:11px;padding:2px 8px;background:var(--color-background-secondary);border-radius:10px;color:var(--color-text-secondary);margin-bottom:6px}
.clog{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px;height:78px;overflow-y:auto;font-size:11px;line-height:1.6;color:var(--color-text-secondary)}
.ld{color:#0F6E56}.ll{color:#BA7517}.lv{color:#534AB7;font-weight:500}.lf{color:#993C1D;font-weight:500}
.arow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.arow:last-child{border-bottom:none}
.aicon{font-size:16px;width:22px;text-align:center}
.ainfo{flex:1}
.aname{font-weight:500;font-size:12px}
.astat{font-size:11px;color:var(--color-text-secondary)}
.abtn{font-size:11px;padding:2px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.abtn:hover{background:var(--color-background-secondary)}
.abtn.can{border-color:#FAC775;color:#BA7517}
.abtn.owned{opacity:0.4;cursor:default;pointer-events:none}
.ppanel{margin-top:10px;background:var(--color-background-primary);border:0.5px solid #FAC77530;border-radius:var(--border-radius-lg);padding:10px}
.pptitle{font-size:13px;font-weight:500;margin-bottom:6px;color:#BA7517}
.ppstars{font-size:18px;letter-spacing:3px;margin-bottom:6px}
.ppdesc{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;line-height:1.5}
.bigbtn{width:100%;padding:7px;font-size:13px;font-weight:500;border:0.5px solid #FAC775;border-radius:var(--border-radius-md);background:transparent;color:#BA7517;cursor:pointer}
.bigbtn:hover{background:#FAEEDA22}
.bigbtn:disabled{opacity:0.35;cursor:default}
.toast{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:7px 14px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;text-align:center;margin:8px 0 0}
</style>

<div style="font-family:var(--font-sans);color:var(--color-text-primary);padding:12px;max-width:680px">
  <div class="top-bar">
    <div class="title">⚔️ 별의 용사들</div>
    <button class="pbtn" id="btn-prestige">✨ 전직</button>
  </div>
  <div class="stat-row">
    <div class="sc"><div class="sc-label">골드</div><div class="sc-val" id="s-gold">0</div></div>
    <div class="sc"><div class="sc-label">초당 데미지</div><div class="sc-val" id="s-dps">0</div></div>
    <div class="sc"><div class="sc-label">층</div><div class="sc-val" id="s-floor">1</div></div>
    <div class="sc"><div class="sc-label">전직</div><div class="sc-val" id="s-prestige">0⭐</div></div>
  </div>
  <div class="main-grid">
    <div class="panel">
      <div class="sec-title">용사 목록</div>
      <div id="hero-list"></div>
    </div>
    <div class="right-col">
      <div class="panel">
        <div class="sec-title">던전 전투</div>
        <div class="mbox">
          <span class="fbadge" id="floor-badge">1층</span>
          <div class="mrow">
            <div class="msprite" id="msprite">👾</div>
            <div class="mgold">
              <div class="mgold-val" id="mgold-val">💰 12</div>
              <div class="mgold-label">처치 골드</div>
            </div>
          </div>
          <div class="mname" id="mname">슬라임 (1층)</div>
          <div class="hpbar"><div class="hpfill" id="hpfill" style="width:100%;background:#5DCAA5"></div></div>
          <div class="hptext" id="hptext">80 / 80</div>
        </div>
        <div class="clog" id="clog"></div>
      </div>
      <div class="panel">
        <div class="sec-title">유물 상점</div>
        <div id="artifact-list"></div>
      </div>
    </div>
  </div>
  <div id="ppanel" class="ppanel" style="display:none">
    <div class="pptitle">✨ 전직 시스템</div>
    <div class="ppstars" id="ppstars">☆☆☆☆☆</div>
    <div class="ppdesc" id="ppdesc">전직하면 모든 골드와 영웅 레벨이 초기화되지만 영구 보너스를 얻습니다.</div>
    <button class="bigbtn" id="btn-do-prestige" disabled>전직하기 (10층 이상 필요)</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const HEROES=[
  {id:0,name:"루나",emoji:"🧙‍♀️",bg:"#E6F1FB",baseDps:5,cost:30,desc:"마법사"},
  {id:1,name:"철갑",emoji:"⚔️",bg:"#EAF3DE",baseDps:12,cost:80,desc:"전사"},
  {id:2,name:"섀도우",emoji:"🗡️",bg:"#FBEAF0",baseDps:25,cost:200,desc:"암살자"},
  {id:3,name:"아이리스",emoji:"🏹",bg:"#EEEDFE",baseDps:60,cost:600,desc:"궁수"},
  {id:4,name:"드래곤로드",emoji:"🐉",bg:"#FAECE7",baseDps:150,cost:2000,desc:"드래곤"},
];
const MONSTERS=[
  {name:"슬라임",emoji:"👾"},{name:"고블린",emoji:"👺"},{name:"스켈레톤",emoji:"💀"},
  {name:"오크",emoji:"🐗"},{name:"트롤",emoji:"🧌"},{name:"드래곤",emoji:"🐲"},
  {name:"악마",emoji:"😈"},{name:"타이탄",emoji:"🔱"},{name:"고대신",emoji:"🌑"},
  {name:"최후의 적",emoji:"👁️"},
];
const ARTIFACTS=[
  {id:0,name:"행운의 반지",emoji:"💍",stat:"골드 +30%",cost:500,type:"gold",val:0.3},
  {id:1,name:"전투 깃발",emoji:"🚩",stat:"데미지 +50%",cost:1500,type:"dmg",val:0.5},
  {id:2,name:"시간의 모래",emoji:"⏳",stat:"전투속도 +40%",cost:4000,type:"speed",val:0.4},
  {id:3,name:"드래곤 비늘",emoji:"🔶",stat:"데미지 +120%",cost:12000,type:"dmg",val:1.2},
  {id:4,name:"별의 파편",emoji:"💫",stat:"골드 +80%",cost:30000,type:"gold",val:0.8},
];

const XP_PERIODS=[60,70,90,110,130];
const TICK_LCM=27720;

let G={gold:0,floor:1,prestigeCount:0,heroLevels:[1,0,0,0,0],ownedArtifacts:[]};
let prestigeMult=1;
let toastTimer=null;
let lastTime=null;
let tickCount=0;
let monsterHp=0,monsterMaxHp=0;
let heroXp=[0,0,0,0,0];

function calcMults(){
  let gm=1,dm=1,sm=1;
  G.ownedArtifacts.forEach(i=>{
    const a=ARTIFACTS[i];
    if(a.type==="gold")gm+=a.val;
    else if(a.type==="dmg")dm+=a.val;
    else if(a.type==="speed")sm+=a.val;
  });
  return{gm,dm,sm};
}

function getTotalDps(dm){
  let d=0;
  HEROES.forEach((h,i)=>{if(G.heroLevels[i]>0)d+=h.baseDps*G.heroLevels[i]*dm*prestigeMult;});
  return Math.floor(d);
}

function getUpgCost(i){
  const lv=G.heroLevels[i];
  return Math.floor(HEROES[i].cost*Math.pow(lv===0?1:1.15,lv));
}

function getMonsterIdx(f){return Math.min(Math.floor((f-1)/3),MONSTERS.length-1);}

function getMonsterHp(f){
  const base=[80,200,500,1200,3000,8000,20000,60000,200000,999999];
  return Math.floor(base[getMonsterIdx(f)]*Math.pow(1.45,(f-1)%3));
}

function calcGoldReward(f,gm){
  return Math.floor(getMonsterHp(f)*0.15*(1+f*0.05)*gm*prestigeMult);
}

function fmt(n){
  n=Math.floor(n);
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return n.toString();
}

function addLog(msg,cls){
  const log=document.getElementById("clog");
  const d=document.createElement("div");
  d.style.cssText="padding:1px 0;font-size:11px";
  if(cls)d.className=cls;
  d.textContent=msg;
  log.appendChild(d);
  while(log.children.length>40)log.removeChild(log.firstChild);
  log.scrollTop=log.scrollHeight;
}

function showToast(msg){
  clearTimeout(toastTimer);
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.opacity="1";
  toastTimer=setTimeout(()=>t.style.opacity="0",2200);
}

function renderHeroes(){
  const el=document.getElementById("hero-list");
  el.innerHTML="";
  const{dm}=calcMults();
  HEROES.forEach((h,i)=>{
    const lv=G.heroLevels[i];
    const cost=getUpgCost(i);
    const can=G.gold>=cost;
    const dps=lv>0?Math.floor(h.baseDps*lv*dm*prestigeMult):0;
    const period=XP_PERIODS[i];
    const xp=Math.round((heroXp[i]%period)/period*100);
    const div=document.createElement("div");
    div.className="hcard"+(lv>0?" on":"");
    const av=document.createElement("div");
    av.className="havatar";av.style.background=h.bg;av.textContent=h.emoji;
    const info=document.createElement("div");
    info.className="hinfo";
    info.innerHTML=`<div class="hname">${h.name} <span style="font-size:10px;color:var(--color-text-tertiary)">${h.desc}</span></div>`
      +`<div class="hsub">${lv>0?"Lv."+lv+" · DPS "+fmt(dps):"잠금 해제 안됨"}</div>`
      +(lv>0?`<div class="xpbar"><div class="xpfill" style="width:${xp}%"></div></div>`:"");
    const btn=document.createElement("button");
    btn.className="hbtn "+(can?"can":"no");
    btn.textContent=(lv===0?"고용 ":"강화 ")+fmt(cost);
    btn.addEventListener("click",()=>buyHero(i));
    div.appendChild(av);div.appendChild(info);div.appendChild(btn);
    el.appendChild(div);
  });
}

function renderArtifacts(){
  const el=document.getElementById("artifact-list");
  el.innerHTML="";
  ARTIFACTS.forEach((a,i)=>{
    const owned=G.ownedArtifacts.includes(i);
    const can=!owned&&G.gold>=a.cost;
    const row=document.createElement("div");row.className="arow";
    const icon=document.createElement("div");icon.className="aicon";icon.textContent=a.emoji;
    const info=document.createElement("div");info.className="ainfo";
    info.innerHTML=`<div class="aname">${a.name}</div><div class="astat">${a.stat}</div>`;
    const btn=document.createElement("button");
    btn.className="abtn"+(owned?" owned":can?" can":"");
    btn.textContent=owned?"보유":fmt(a.cost);
    if(!owned)btn.addEventListener("click",()=>buyArtifact(i));
    row.appendChild(icon);row.appendChild(info);row.appendChild(btn);
    el.appendChild(row);
  });
}

function updateMonsterUI(gm){
  const m=MONSTERS[getMonsterIdx(G.floor)];
  document.getElementById("msprite").textContent=m.emoji;
  document.getElementById("mname").textContent=m.name+" ("+G.floor+"층)";
  document.getElementById("floor-badge").textContent=G.floor+"층";
  const pct=Math.max(0,Math.min(100,monsterHp/monsterMaxHp*100));
  const fill=document.getElementById("hpfill");
  fill.style.width=Math.round(pct)+"%";
  fill.style.background=pct>50?"#5DCAA5":pct>25?"#EF9F27":"#F09595";
  document.getElementById("hptext").textContent=fmt(monsterHp)+" / "+fmt(monsterMaxHp);
  document.getElementById("mgold-val").textContent="💰 "+fmt(calcGoldReward(G.floor,gm));
}

function updateStats(dps){
  document.getElementById("s-gold").textContent=fmt(G.gold);
  document.getElementById("s-dps").textContent=fmt(dps);
  document.getElementById("s-floor").textContent=G.floor;
  document.getElementById("s-prestige").textContent=G.prestigeCount+"⭐";
  const canP=G.floor>=10;
  document.getElementById("btn-prestige").className="pbtn"+(canP?" glow":"");
  const pBtn=document.getElementById("btn-do-prestige");
  pBtn.disabled=!canP;
  pBtn.textContent=canP?"전직하기 ("+G.floor+"층 달성!)":"전직하기 (10층 이상 필요)";
  const n=G.prestigeCount;
  const cycle=n%5;const gen=Math.floor(n/5);
  document.getElementById("ppstars").textContent="⭐".repeat(cycle)+"☆".repeat(5-cycle)+(gen>0?" ×"+(gen+1):"");
  document.getElementById("ppdesc").textContent=
    "전직하면 모든 골드와 영웅 레벨이 초기화되지만 영구 보너스를 얻습니다. 현재 보너스: +"+Math.round((prestigeMult-1)*100)+"%";
}

function buyHero(i){
  const cost=getUpgCost(i);
  if(G.gold<cost)return;
  G.gold-=cost;
  const wasNew=G.heroLevels[i]===0;
  G.heroLevels[i]++;
  if(wasNew)addLog("✅ "+HEROES[i].name+" 영입!","lv");
  else if(G.heroLevels[i]%5===0)addLog("🌟 "+HEROES[i].name+" Lv."+G.heroLevels[i],"lv");
  const{dm,gm}=calcMults();
  renderHeroes();updateMonsterUI(gm);updateStats(getTotalDps(dm));
}

function buyArtifact(i){
  const a=ARTIFACTS[i];
  if(G.ownedArtifacts.includes(i)||G.gold<a.cost)return;
  G.gold-=a.cost;
  G.ownedArtifacts.push(i);
  showToast("✨ "+a.name+" 획득!");
  addLog("✨ 유물: "+a.name,"ll");
  const{dm,gm}=calcMults();
  renderArtifacts();updateMonsterUI(gm);updateStats(getTotalDps(dm));
}

function spawnMonster(){
  monsterMaxHp=getMonsterHp(G.floor);
  monsterHp=monsterMaxHp;
}

document.getElementById("btn-prestige").addEventListener("click",()=>{
  const p=document.getElementById("ppanel");
  p.style.display=p.style.display==="none"?"block":"none";
});

document.getElementById("btn-do-prestige").addEventListener("click",()=>{
  if(G.floor<10){showToast("10층 이상 달성 후 전직 가능!");return;}
  G.prestigeCount++;
  prestigeMult=1+G.prestigeCount*0.5;
  G.gold=0;G.heroLevels=[1,0,0,0,0];G.ownedArtifacts=[];
  G.floor=1;heroXp=[0,0,0,0,0];
  spawnMonster();
  showToast("🌟 전직 완료! 영구 보너스 +"+Math.round((prestigeMult-1)*100)+"%");
  addLog("🌟 전직 "+G.prestigeCount+"회 완료!","lf");
  const{dm,gm}=calcMults();
  renderHeroes();renderArtifacts();updateMonsterUI(gm);updateStats(getTotalDps(dm));
  document.getElementById("ppanel").style.display="none";
});

function gameTick(ts){
  requestAnimationFrame(gameTick);
  if(!lastTime){lastTime=ts;return;}
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  tickCount=(tickCount+1)%TICK_LCM;

  const{gm,dm,sm}=calcMults();
  const dps=getTotalDps(dm);

  heroXp=heroXp.map((v,i)=>G.heroLevels[i]>0?v+dt:v);

  if(dps>0){
    monsterHp=Math.max(0,monsterHp-dps*dt*sm);

    if(tickCount%60===0){
      const s=document.getElementById("msprite");
      s.classList.add("hit");
      setTimeout(()=>s.classList.remove("hit"),80);
    }
    if(tickCount%180===0){
      addLog("💥 "+MONSTERS[getMonsterIdx(G.floor)].name+"에 "+fmt(dps*sm)+" DPS","ld");
    }

    if(monsterHp<=0){
      const killedName=MONSTERS[getMonsterIdx(G.floor)].name;
      const killedFloor=G.floor;
      const gold=calcGoldReward(killedFloor,gm);
      G.gold+=gold;
      addLog("💰 "+killedName+" ("+killedFloor+"층) 처치! +"+fmt(gold)+" 골드","ll");
      G.floor++;
      spawnMonster();
      if(G.floor%5===0)addLog("🏆 "+G.floor+"층 돌파!","lf");
      if(G.floor%10===0)showToast("🏆 "+G.floor+"층 돌파!");
    }
  }

  updateMonsterUI(gm);
  if(tickCount%30===0){renderHeroes();renderArtifacts();}
  updateStats(dps);
}

spawnMonster();
renderHeroes();
renderArtifacts();
const{dm:initDm,gm:initGm}=calcMults();
updateMonsterUI(initGm);
updateStats(getTotalDps(initDm));
addLog("⚔️ 모험 시작! 영웅을 고용하세요","lf");
requestAnimationFrame(gameTick);
</script>
