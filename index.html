<style>
*{box-sizing:border-box;margin:0;padding:0}
.g{padding:1rem;max-width:680px;margin:0 auto;font-family:var(--font-sans);color:var(--color-text-primary)}
.two-col{display:grid;grid-template-columns:1fr 210px;gap:12px;align-items:start}
.top-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.sl{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
.sv{font-size:18px;font-weight:500}
.sv.hp{color:#D85A30}.sv.gold{color:#BA7517}.sv.wave{color:#185FA5}
.arena{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:10px}
.wave-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.wave-label{font-size:11px;color:var(--color-text-secondary)}
.wave-btn{font-size:13px;width:26px;height:26px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center}
.wave-num{font-size:14px;font-weight:500;min-width:32px;text-align:center;color:#185FA5}
.enemy-stat{font-size:10px;color:var(--color-text-secondary);margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap}
.enemy-stat span{color:var(--color-text-primary)}
.party{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:10px}
.unit{text-align:center;flex:1}
.uicon{font-size:26px;line-height:1;margin-bottom:4px;display:block}
.uname-u{font-size:11px;font-weight:500;margin-bottom:3px}
.hbar{height:5px;background:var(--color-background-primary);border-radius:3px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);margin-bottom:2px}
.hfill{height:100%;border-radius:3px;transition:width .15s}
.hero-hf{background:#1D9E75}.enemy-hf{background:#D85A30}
.htext{font-size:10px;color:var(--color-text-secondary)}
.vs{font-size:14px;font-weight:500;color:var(--color-text-secondary);flex-shrink:0;padding-top:18px}
.buff-row{display:flex;gap:5px;flex-wrap:wrap;min-height:18px;margin-top:7px}
.buff-tag{font-size:10px;padding:2px 6px;border-radius:var(--border-radius-md);background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success)}
.log-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:7px 9px;height:88px;overflow-y:auto;margin-bottom:10px}
.le{font-size:11px;color:var(--color-text-secondary);line-height:1.6}
.le.atk{color:#185FA5}.le.enemy{color:#D85A30}.le.heal{color:#0F6E56}.le.kill{color:#0F6E56;font-weight:500}.le.upg{color:#BA7517;font-weight:500}
.ctrl{display:flex;gap:5px;align-items:center}
.clabel{font-size:11px;color:var(--color-text-secondary)}
.spd{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.spd.on{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.upg-panel{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px}
.upg-title{font-size:12px;font-weight:500;margin-bottom:6px;color:var(--color-text-secondary)}
.qty-row{display:flex;gap:4px;margin-bottom:10px}
.qty-btn{flex:1;font-size:11px;padding:4px 0;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;text-align:center}
.qty-btn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.ucard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;margin-bottom:7px}
.ucard:last-child{margin-bottom:0}
.ucard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ucard-name{font-size:12px;font-weight:500}
.ucard-val{font-size:11px;color:var(--color-text-secondary)}
.ucard-val span{color:var(--color-text-primary);font-weight:500}
.ubtn{width:100%;font-size:11px;padding:5px 0;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;text-align:center}
.ubtn:disabled{opacity:.35;cursor:default}
.ubtn:hover:not(:disabled){background:var(--color-background-secondary)}
.ucost{color:#BA7517}
</style>

<div class="g">
  <h2 class="sr-only">방치형 전투 게임</h2>
  <div class="two-col">
    <div>
      <div class="top-row">
        <div class="sc"><div class="sl">HP</div><div class="sv hp" id="hpD">100/100</div></div>
        <div class="sc"><div class="sl">골드</div><div class="sv gold" id="goldD">0</div></div>
        <div class="sc"><div class="sl">웨이브</div><div class="sv wave" id="waveD">1</div></div>
      </div>

      <div class="arena">
        <div class="wave-ctrl">
          <span class="wave-label">웨이브:</span>
          <button class="wave-btn" onclick="changeWave(-1)">◀</button>
          <span class="wave-num" id="waveNum">1</span>
          <button class="wave-btn" onclick="changeWave(1)">▶</button>
        </div>
        <div class="enemy-stat" id="eStatPreview"></div>

        <div class="party">
          <div class="unit">
            <span class="uicon">🧘</span>
            <div class="uname-u">도사</div>
            <div class="htext">1초마다 힐</div>
          </div>
          <div class="unit">
            <span class="uicon">🧙</span>
            <div class="uname-u">영웅</div>
            <div class="hbar"><div class="hfill hero-hf" id="heroHB" style="width:100%"></div></div>
            <div class="htext" id="heroHS">100/100</div>
          </div>
          <div class="vs">VS</div>
          <div class="unit">
            <span class="uicon" id="eIcon">👹</span>
            <div class="uname-u" id="eN">몬스터</div>
            <div class="hbar"><div class="hfill enemy-hf" id="eHB" style="width:100%"></div></div>
            <div class="htext" id="eHS">10/10</div>
          </div>
        </div>
        <div class="buff-row" id="buffRow"></div>
      </div>

      <div class="log-box" id="logBox"></div>
      <div class="ctrl">
        <span class="clabel">속도:</span>
        <button class="spd on" onclick="setSpd(1)" id="s1">1x</button>
        <button class="spd" onclick="setSpd(2)" id="s2">2x</button>
        <button class="spd" onclick="setSpd(10)" id="s10">10x</button>
        <button class="spd" onclick="setSpd(30)" id="s30">30x</button>
      </div>
    </div>

    <div>
      <div class="upg-panel">
        <div class="upg-title">업그레이드</div>
        <div class="qty-row">
          <button class="qty-btn on" onclick="setQty(1)" id="q1">x1</button>
          <button class="qty-btn" onclick="setQty(10)" id="q10">x10</button>
          <button class="qty-btn" onclick="setQty(100)" id="q100">x100</button>
        </div>

        <div class="ucard">
          <div class="ucard-top">
            <span class="ucard-name">❤️ 체력</span>
            <span class="ucard-val">현재 <span id="vHp">100</span></span>
          </div>
          <div class="ucard-val" style="margin-bottom:5px">+<span id="qHp">10</span> &nbsp; <span class="ucost" id="cHp">골드 100</span></div>
          <button class="ubtn" id="uHp" onclick="upg('hp')">구매</button>
        </div>

        <div class="ucard">
          <div class="ucard-top">
            <span class="ucard-name">💜 도사 힐량</span>
            <span class="ucard-val">현재 <span id="vHeal">18</span></span>
          </div>
          <div class="ucard-val" style="margin-bottom:5px">+<span id="qHeal">10</span> &nbsp; <span class="ucost" id="cHeal">골드 100</span></div>
          <button class="ubtn" id="uHeal" onclick="upg('heal')">구매</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const TICK = 100, UNIT_COST = 100;
let spd = 1, gold = 0, wave = 1, selectedWave = 1, dead = false, buffs = [], qty = 1;
let hero = {hp:100, maxHp:100};
let sage = {healPow:18};
let heroTimer = 0, sageTimer = 0, enemyTimer = 0;
let enemy = null;

const ICONS = ['👹','🐗','👺','🐉','💀','👿','🦇','🐺'];

function enemyStats(w) {
  return {
    hp:w*10, atk:w*10, reward:w*10,
    icon:ICONS[Math.floor((w-1)/10)%ICONS.length],
    name:'웨이브 '+w+' 몬스터'
  };
}

function updatePreview() {
  const s = enemyStats(selectedWave);
  document.getElementById('eStatPreview').innerHTML =
    'HP: <span>'+s.hp+'</span> &nbsp; 공격력: <span>'+s.atk+'</span> &nbsp; 골드: <span>'+s.reward+'</span>';
  document.getElementById('waveNum').textContent = selectedWave;
}

function changeWave(d) {
  selectedWave = Math.max(1, selectedWave+d);
  wave = selectedWave;
  updatePreview();
  heroTimer=0; sageTimer=0; enemyTimer=0;
  addLog('웨이브 '+wave+' 으로 이동!', 'upg');
  spawnEnemy();
}

function spawnEnemy() {
  const s = enemyStats(wave);
  enemy = {name:s.name, icon:s.icon, hp:s.hp, maxHp:s.hp, atk:s.atk, reward:s.reward};
  document.getElementById('eIcon').textContent = enemy.icon;
  document.getElementById('eN').textContent = enemy.name;
  render();
}

function addLog(msg, cls='') {
  const b = document.getElementById('logBox');
  const el = document.createElement('div');
  el.className='le '+cls; el.textContent=msg;
  b.appendChild(el);
  if(b.children.length>60) b.removeChild(b.firstChild);
  b.scrollTop=b.scrollHeight;
}

function addBuff(label, duration) {
  buffs=buffs.filter(b=>b.label!==label);
  buffs.push({label, until:Date.now()+duration});
  renderBuffs();
}

function renderBuffs() {
  const now=Date.now();
  buffs=buffs.filter(b=>b.until>now);
  const row=document.getElementById('buffRow');
  row.innerHTML='';
  buffs.forEach(b=>{
    const span=document.createElement('span');
    span.className='buff-tag'; span.textContent=b.label;
    row.appendChild(span);
  });
}

function setQty(n) {
  qty=n;
  ['q1','q10','q100'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('q'+n).classList.add('on');
  render();
}

function upg(t) {
  const cost = UNIT_COST * qty;
  if(gold < cost) return;
  gold -= cost;
  if(t==='hp'){
    const gain = qty*10;
    hero.maxHp += gain;
    hero.hp = Math.min(hero.hp+gain, hero.maxHp);
    addLog('❤️ 체력 +'+gain+' → '+hero.maxHp, 'upg');
  } else if(t==='heal'){
    const gain = qty*10;
    sage.healPow += gain;
    addLog('💜 도사 힐량 +'+gain+' → '+sage.healPow, 'upg');
  }
  render();
}

function setSpd(s) {
  spd=s;
  ['s1','s2','s10','s30'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('s'+s).classList.add('on');
}

function sageHeal() {
  const amt = sage.healPow + Math.floor(Math.random()*8);
  const before = hero.hp;
  hero.hp = Math.min(hero.maxHp, hero.hp+amt);
  const actual = hero.hp - before;
  if(actual > 0) {
    addLog('💜 도사가 영웅을 치료! +'+actual+' HP', 'heal');
    addBuff('힐 +'+actual, 2000);
  }
}

function heroAttack() {
  if(!enemy) return false;
  // 현재 HP의 10% 소모 (최소 1), 소모한 HP만큼 데미지
  const cost = Math.max(1, Math.floor(hero.hp * 0.1));
  hero.hp -= cost;
  const dmg = cost;
  enemy.hp = Math.max(0, enemy.hp - dmg);
  addLog('🩸 HP '+cost+' 소모 → 적에게 '+dmg+' 피해', 'atk');
  if(enemy.hp <= 0) {
    gold += enemy.reward;
    addLog('💀 처치! +'+enemy.reward+' 골드', 'kill');
    enemy = null;
    setTimeout(spawnEnemy, 400);
    render();
    return true;
  }
  return false;
}

function render() {
  const hpct = Math.round((hero.hp/hero.maxHp)*100);
  const epct = enemy ? Math.round((enemy.hp/enemy.maxHp)*100) : 0;
  document.getElementById('heroHB').style.width = hpct+'%';
  document.getElementById('heroHS').textContent = hero.hp+'/'+hero.maxHp;
  document.getElementById('hpD').textContent = hero.hp+'/'+hero.maxHp;
  if(enemy){
    document.getElementById('eHB').style.width = epct+'%';
    document.getElementById('eHS').textContent = enemy.hp+'/'+enemy.maxHp;
  }
  document.getElementById('goldD').textContent = gold;
  document.getElementById('waveD').textContent = wave;

  const cost = UNIT_COST*qty;
  document.getElementById('vHp').textContent = hero.maxHp;
  document.getElementById('vHeal').textContent = sage.healPow;
  document.getElementById('qHp').textContent = qty*10;
  document.getElementById('qHeal').textContent = qty*10;
  document.getElementById('cHp').textContent = '골드 '+cost;
  document.getElementById('cHeal').textContent = '골드 '+cost;
  document.getElementById('uHp').disabled = gold<cost;
  document.getElementById('uHeal').disabled = gold<cost;
  renderBuffs();
}

function tick() {
  if(dead) return;

  // 실제 경과 ms 누적 (spd 배율 적용)
  const elapsed = TICK * spd;
  heroTimer  += elapsed;
  sageTimer  += elapsed;
  enemyTimer += elapsed;

  // 도사 힐: 1초마다 (여러 번 쌓였으면 여러 번 발동)
  while(sageTimer >= 1000){
    sageTimer -= 1000;
    sageHeal();
  }

  // 영웅 공격: 1초마다
  while(heroTimer >= 1000){
    heroTimer -= 1000;
    if(!enemy) break;
    const killed = heroAttack();
    if(killed){ render(); return; }
  }

  // 적 공격: 1초마다
  while(enemy && enemyTimer >= 1000){
    enemyTimer -= 1000;
    const dmg = enemy.atk + Math.floor(Math.random()*4);
    hero.hp = Math.max(0, hero.hp - dmg);
    addLog('💢 적 반격! '+dmg+' 피해', 'enemy');
    if(hero.hp <= 0){
      dead = true;
      addLog('💀 영웅이 쓰러졌습니다! 게임 오버', 'kill');
      render();
      setTimeout(()=>{
        if(confirm('다시 시작하시겠습니까?\n(업그레이드는 유지됩니다)')) restart();
      }, 400);
      return;
    }
  }

  render();
}

function restart() {
  // 업그레이드(maxHp, healPow) 유지, 골드/웨이브/타이머만 초기화
  dead=false; gold=0; wave=1; selectedWave=1; buffs=[];
  heroTimer=0; sageTimer=0; enemyTimer=0;
  hero.hp = hero.maxHp; // HP만 풀 회복, maxHp는 유지
  document.getElementById('logBox').innerHTML='';
  updatePreview();
  addLog('🩸 다시 시작! (체력 '+hero.maxHp+' / 힐량 '+sage.healPow+' 유지)');
  spawnEnemy();
}

updatePreview();
spawnEnemy();
addLog('🩸 영웅은 현재 HP의 10%를 소모해 공격합니다. 도사가 1초마다 회복!');
setInterval(tick, TICK);
</script>
